# gate-policy — bản DỮ LIỆU máy-đọc-được (runtime).
# Hợp đồng/định nghĩa field nằm ở Design/Core/Schemas/gate-policy.md; file này là dữ liệu runtime
# để adapter KHÔNG phải parse markdown. Hai file phải khớp nhau; lệch thì dừng và báo.
# Đặt cạnh script.yaml để loader đọc cùng chỗ.
version: 2.0.0
gates:
  - id: scope-locked
    requires_docs: ["00-vision.md", "01-personas.md", "02-scope.md"]
    blocks: ["Write", "Edit", "Bash"]
    message: "Phỏng vấn chưa xong tới S3 (scope). Hoàn tất doc trước khi sinh code."
  - id: plan-validated
    requires_docs: [
      "00-vision.md",
      "01-personas.md",
      "02-scope.md",
      "03-data-model.md",
      "04-flows.md",
      "05-architecture.md",
      "06-constraints.md",
      "08-build-plan.md",
      "README.md"
    ]
    requires_validation: true
    blocks: ["Write", "Edit", "Bash"]
    message: "Kế hoạch thực thi chưa vượt qua kiểm tra ngữ nghĩa (validation pass). Vui lòng khắc phục các lỗi trong 08-build-plan.md."
